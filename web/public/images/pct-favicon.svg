<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Notebook body -->
  <rect x="5" y="2" width="22" height="28" rx="2" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <!-- Spine binding -->
  <line x1="10" y1="2" x2="10" y2="30" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
  <!-- Ruled lines -->
  <line x1="13" y1="9" x2="24" y2="9" stroke="#334155" stroke-width="0.8"/>
  <line x1="13" y1="14" x2="24" y2="14" stroke="#334155" stroke-width="0.8"/>
  <line x1="13" y1="19" x2="24" y2="19" stroke="#334155" stroke-width="0.8"/>
  <line x1="13" y1="24" x2="24" y2="24" stroke="#334155" stroke-width="0.8"/>
  <!-- Chart line (uptrend) -->
  <polyline points="13,23 16,18 19,20 22,11" stroke="#4ade80" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="22" cy="11" r="1.5" fill="#4ade80"/>
</svg>
